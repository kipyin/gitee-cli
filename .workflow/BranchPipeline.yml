# Gitee Go pipeline — minimal cargo test on push to main.
# The heavy lifting (4-platform build, GitHub Release) stays in GitHub Actions;
# this is the Gitee-side first-pass check (option C: lightweight verification).
#
# Uses the documented build@gcc plugin (Ubuntu 20.04 base). Rust toolchain and
# crates.io downloads go through the rsproxy.cn mirror — direct access to
# static.rust-lang.org from Gitee runners stalls for 10+ minutes.
version: '1.0'
name: cargo-test
displayName: Cargo Test
triggers:
  push:
    branches:
      precise:
        - main
stages:
  - stage: test
    displayName: 测试
    strategy: fast
    trigger: auto
    steps:
      - step: build@gcc
        name: cargo_test
        displayName: cargo test
        gccVersion: 9.4
        commands:
          # China-network mirrors: rustup dist server + crates.io sparse index.
          - export RUSTUP_DIST_SERVER=https://rsproxy.cn
          - export RUSTUP_UPDATE_ROOT=https://rsproxy.cn/rustup
          - mkdir -p ~/.cargo && printf '[source.crates-io]\nreplace-with = "rsproxy-sparse"\n[source.rsproxy-sparse]\nregistry = "sparse+https://rsproxy.cn/index/"\n' > ~/.cargo/config.toml
          # Install rustup only if the runner image lacks it (it persists between runs).
          - export PATH="$HOME/.cargo/bin:$PATH"
          - command -v cargo >/dev/null || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable)
          - cargo test --locked
