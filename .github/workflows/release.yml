name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # rustls' aws-lc-rs compiles C; cross-compiling to aarch64-linux needs the
      # GNU cross toolchain + matching linker/cc env on the x86_64 ubuntu runner.
      - name: Install cross toolchain (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          PKG="gitee-${TARGET}-v${VERSION}"
          mkdir -p "${PKG}"
          cp "target/${TARGET}/release/gitee" "${PKG}/gitee"
          tar -cJf "${PKG}.tar.xz" "${PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitee-${{ matrix.target }}
          path: gitee-${{ matrix.target }}-v*.tar.xz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.xz
          generate_release_notes: true

  mirror-gitee:
    name: Mirror release to Gitee
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Dogfood: use the x86_64-linux gitee binary built by the matrix above
      # to create the Gitee Release and attach the same tarballs.
      - name: Install gitee CLI from build artifact
        run: |
          tar -xJf dist/gitee-x86_64-unknown-linux-gnu-v*.tar.xz
          sudo install -m 755 gitee-x86_64-unknown-linux-gnu-v*/gitee /usr/local/bin/gitee

      - name: Create Gitee Release and upload assets
        env:
          # Config::token reads GITEE_TOKEN first — no `auth login` needed.
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "::warning::GITEE_TOKEN secret not set — skipping Gitee release mirror"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME}"
          REPO="kipyt/gitee-cli"
          # create is idempotent: an existing release just prints the API error.
          gitee --repo "$REPO" release create --tag "$TAG" --name "$TAG" --target main || true
          gitee --repo "$REPO" release upload "$TAG" dist/*.tar.xz
