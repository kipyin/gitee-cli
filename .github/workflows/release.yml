name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # rustls' aws-lc-rs compiles C; cross-compiling to aarch64-linux needs the
      # GNU cross toolchain + matching linker/cc env on the x86_64 ubuntu runner.
      - name: Install cross toolchain (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          PKG="gitee-${TARGET}-v${VERSION}"
          mkdir -p "${PKG}"
          cp "target/${TARGET}/release/gitee" "${PKG}/gitee"
          tar -cJf "${PKG}.tar.xz" "${PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitee-${{ matrix.target }}
          path: gitee-${{ matrix.target }}-v*.tar.xz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.xz
          generate_release_notes: true

  # Bumps kipyin/homebrew-tap Formula/gitee.rb to this tag's macOS tarballs.
  # Requires repo secret HOMEBREW_TAP_TOKEN: a PAT (or fine-grained token) with
  # contents:write on kipyin/homebrew-tap. Default GITHUB_TOKEN cannot push
  # to another repository.
  homebrew:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Hash the same GitHub Release assets Homebrew will fetch (not the
      # intermediate workflow artifacts from `build`).
      - name: Download macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "gitee-*-apple-darwin-v${VERSION}.tar.xz"
          test -f "dist/gitee-aarch64-apple-darwin-v${VERSION}.tar.xz"
          test -f "dist/gitee-x86_64-apple-darwin-v${VERSION}.tar.xz"

      - name: Update Formula/gitee.rb
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set (needs contents:write on kipyin/homebrew-tap)"
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          ARM_TAR="dist/gitee-aarch64-apple-darwin-v${VERSION}.tar.xz"
          X86_TAR="dist/gitee-x86_64-apple-darwin-v${VERSION}.tar.xz"
          test -f "$ARM_TAR" && test -f "$X86_TAR"
          ARM_SHA="$(sha256sum "$ARM_TAR" | awk '{print $1}')"
          X86_SHA="$(sha256sum "$X86_TAR" | awk '{print $1}')"

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/kipyin/homebrew-tap.git" \
            tap

          if grep -q "version \"${VERSION}\"" tap/Formula/gitee.rb \
            && grep -q "sha256 \"${ARM_SHA}\"" tap/Formula/gitee.rb \
            && grep -q "sha256 \"${X86_SHA}\"" tap/Formula/gitee.rb; then
            echo "Formula already at ${VERSION}; nothing to do."
            exit 0
          fi

          python3 .github/scripts/bump-homebrew-formula.py \
            tap/Formula/gitee.rb "$VERSION" "$ARM_SHA" "$X86_SHA"

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gitee.rb
          git commit -m "bump gitee to ${VERSION}"
          git push origin HEAD
          echo "Bumped kipyin/homebrew-tap to gitee ${VERSION}"
